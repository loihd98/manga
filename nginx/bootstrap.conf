########################################################
# BOOTSTRAP CONFIG - HTTP only, no SSL
# Use this to obtain the first Let's Encrypt certificate.
# After certbot succeeds, swap back to prod.conf and restart nginx.
########################################################
server {
    listen 80;
    server_name khotruyen.vn www.khotruyen.vn;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Temporary: serve a plain 200 so everything is reachable
    location / {
        return 200 'Bootstrapping SSL...';
        add_header Content-Type text/plain;
    }
}
